{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded shadow">

    <h2 class="text-xl font-semibold mb-4 text-center">Reset Password</h2>

    <p class="text-center text-gray-500 mb-4">
        OTP expires in <span id="timer">05:00</span>
    </p>

    <form method="POST" class="space-y-4">

        <input type="text" name="otp" placeholder="Enter OTP"
            class="w-full p-2 border rounded" required>

        <input type="password" name="password" placeholder="New Password"
            class="w-full p-2 border rounded" required>

        <input type="password" name="confirm_password" placeholder="Confirm Password"
            class="w-full p-2 border rounded" required>

        <button type="submit"
            class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
            Reset Password
        </button>
        <a href="/forgot-password"
            class="w-full inline-block text-center bg-green-600 text-white p-2 rounded hover:bg-green-700">
            Request new OTP
        </a>

    </form>

    <p class="mt-4 text-center">
        <a href="/login" class="text-blue-600 hover:underline">
            Back to login
        </a>
    </p>

</div>

<script>
let time = 300;

const timerEl = document.getElementById("timer");

const countdown = setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    timerEl.textContent =
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');

    time--;

    if (time < 0) {
        clearInterval(countdown);
        timerEl.textContent = "Expired";
    }
}, 1000);
</script>

{% endblock %}
