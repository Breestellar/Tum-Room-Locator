{% extends "base.html" %}

{% block content %}

<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">

    <h2 class="text-xl font-bold mb-4">My Account</h2>

    <div class="mb-4">
        <p><strong>Username:</strong> {{ current_user.username }}</p>
        <p><strong>Email:</strong> {{ current_user.email }}</p>
    </div>

    <div class="flex flex-col gap-3">

        <a href="/change-password"
           class="bg-green-600 text-white px-4 py-2 rounded text-center hover:bg-green-700">
            Change Password
        </a>

        <a href="/change-email"
           class="bg-orange-500 text-white px-4 py-2 rounded text-center hover:bg-orange-600">
            Change Email
        </a>

    </div>

</div>

{% endblock %}
