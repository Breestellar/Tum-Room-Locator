{% extends "base.html" %}
{% block content %}

<div class="max-w-3xl mx-auto p-4">

    <div class="bg-white rounded-xl shadow p-6">
        <h2 class="text-2xl font-bold text-green-700 mb-2">My Account</h2>
        <p class="text-gray-500 mb-6">Manage your profile and security settings.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-50 border rounded-lg p-4">
                <p class="text-sm text-gray-500">Username</p>
                <p class="font-semibold text-gray-800">{{ current_user.username }}</p>
            </div>

            <div class="bg-gray-50 border rounded-lg p-4">
                <p class="text-sm text-gray-500">Email</p>
                <p class="font-semibold text-gray-800 break-all">{{ current_user.email }}</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <a href="/change-password"
               class="bg-green-600 text-white px-4 py-3 rounded-lg text-center hover:bg-green-700">
                Change Password
            </a>

            <a href="/change-email"
               class="bg-orange-500 text-white px-4 py-3 rounded-lg text-center hover:bg-orange-600">
                Change Email
            </a>
        </div>
    </div>

</div>

{% endblock %}
