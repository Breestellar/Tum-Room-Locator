{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">

    <h2 class="text-2xl font-bold text-green-700 mb-6">Edit Building</h2>

    <form method="POST" class="space-y-4">
        <label class="block">
            <span class="text-sm font-medium text-gray-700">Building Name</span>
            <input type="text" name="name" value="{{ building.name }}"
                   class="w-full border p-3 rounded-lg" required>
        </label>

        <label class="block">
            <span class="text-sm font-medium text-gray-700">Latitude</span>
            <input type="number" step="any" name="latitude" value="{{ building.latitude }}"
                   class="w-full border p-3 rounded-lg" required>
        </label>

        <label class="block">
            <span class="text-sm font-medium text-gray-700">Longitude</span>
            <input type="number" step="any" name="longitude" value="{{ building.longitude }}"
                   class="w-full border p-3 rounded-lg" required>
        </label>

        <button type="submit"
                class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
            Save Changes
        </button>
    </form>

    <p class="mt-5 text-center text-sm">
        <a href="/admin" class="text-blue-600 hover:underline">Back to Admin</a>
    </p>

</div>

{% endblock %}
