{% extends "base.html" %}

{% block content %}

<div class="relative w-full h-[600px]">

    <!-- MAP -->
    <div id="map" class="w-full h-full rounded-lg shadow z-0"></div>

    <!-- CONTROLS -->
    <div class="absolute top-4 left-4 right-4 z-[1100] flex gap-2 items-center">

        <div class="relative flex-1">
            <input type="text" id="searchInput"
                   placeholder="Search building or room..."
                   class="border p-2 rounded w-full shadow">

            <div id="suggestions"
                 class="absolute w-full bg-white border rounded shadow mt-1 hidden z-[1200] max-h-60 overflow-y-auto">
            </div>
        </div>

        <button onclick="resetMap()"
            class="bg-orange-500 text-white px-4 py-2 rounded shadow">
            Reset
        </button>

    </div>

    <!-- RECENTS -->
    <div id="recentsPanel"
         class="absolute top-20 left-4 w-64 bg-white shadow-lg rounded-lg p-3 z-[1100] max-h-60 overflow-y-auto">

        <h4 class="text-sm font-semibold mb-2">Recent</h4>
        <div id="recentList"></div>
    </div>

    <!-- ROOM INFO -->
    <div id="roomInfo"
         class="absolute top-32 left-4 w-64 z-[1100]"></div>

</div>

<!-- DIRECTIONS PANEL -->
<div id="directionsPanel"
     class="fixed bottom-0 left-0 w-full bg-white shadow-lg rounded-t-xl p-4 z-[1200] hidden
            md:top-0 md:right-0 md:left-auto md:h-full md:w-96 md:rounded-none">

    <div class="flex justify-between items-center mb-3">
        <h3 class="font-bold text-lg">Directions</h3>
        <button onclick="closeDirections()" class="text-red-500 font-bold">✕</button>
    </div>

    <div id="routeOptions" class="space-y-2 mb-4"></div>
    <div id="etaBox" class="text-sm text-gray-600 mb-4"></div>

    <div class="flex gap-2">
        <button id="startNavBtn"
            class="bg-green-600 text-white px-4 py-2 rounded w-full">
            Start
        </button>
    </div>

    <div id="rerouteNotice"
        class="hidden text-orange-500 text-sm mt-2">
        Recalculating route...
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>

{% endblock %}
