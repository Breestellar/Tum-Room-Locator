{% extends "base.html" %}

{% block content %}

<div class="relative w-full h-[600px]">

    <div id="map" class="w-full h-full rounded-lg shadow"></div>

    <!-- CONTROLS PANEL -->
    <div class="absolute top-4 left-4 right-4 z-[1000] flex gap-2 items-center">

        <label for="campusSelect" class="sr-only">Select Campus</label>
        <select id="campusSelect" class="border p-2 rounded bg-white w-1/4 shadow">
            <option value="">All Campuses</option>
            <option value="1">Main Campus</option>
            <option value="2">Mazrui Campus</option>
        </select>

        <div class="relative flex-1">
            <input type="text" id="searchInput"
                   placeholder="Search building..."
                   class="border p-2 rounded w-full shadow">

            <div id="suggestions"
                 class="absolute w-full bg-white border rounded shadow mt-1 hidden z-[1001] max-h-60 overflow-y-auto">
            </div>
        </div>

        <button onclick="resetMap()"
            class="bg-orange-500 text-white px-4 py-2 rounded shadow">
            Reset
        </button>

    </div>

    <!-- RECENT BUILDINGS PANEL --> 
    <div class="absolute top-20 left-4 w-64 bg-white shadow-lg rounded-lg p-3 z-[1000] max-h-60 overflow-y-auto">
        <h4 class="text-sm font-semibold mb-2">Recent</h4>
        <div id="recentList"></div>
    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
{% endblock %}
