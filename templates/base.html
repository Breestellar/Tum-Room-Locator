<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUM Room Locator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    {% if 'user_id' in session %}

    <!-- SIDEBAR -->
    <div id="sidebar"
        class="fixed top-0 left-0 h-screen w-64 bg-green-700 text-white z-[2000] transform -translate-x-full md:translate-x-0 transition">

        <button onclick="toggleSidebar()"
            class="fixed top-4 left-4 z-[2100] bg-green-700 text-white p-2 rounded shadow">
        ☰
        </button><br><br>


        <div id="sidebarContent" class="p-3 space-y-3">
            <span class="label">
                <p class="text-sm">{{ current_user.username }}</p><br>
            </span>

            <span class="label">
                <p class="text-sm">{{ current_user.email }}</p><br>
            </span>

            <span class="label">
                <a href="/map">Map</a><br><br>
            </span>
            <span class="label">
                <a href="/account">Account</a><br><br>
            </span>
            <span class="label">
                <a href="/recents">Recents</a><br><br>
            </span>

            {% if current_user.role == 'admin' %}
                <span class="label">
                    <a href="/admin">Admin</a><br><br>
                </span>
                <span class="label">
                    <a href="/manage_users">Manage Users</a><br><br>
                </span>
            {% endif %}

            <span class="label">
                <a href="/logout">Logout</a><br><br>
            </span>

        </div>

    </div>

    {% endif %}

    <!-- MAIN -->
    <div id="mainContent"
        class="flex-1 ml-0 md:ml-64 transition-all duration-300">
        {% block content %}{% endblock %}
    </div>

</div>

<script>
let collapsed = false;

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('mainContent');

    sidebar.classList.toggle('-translate-x-full');

    if (window.innerWidth >= 768) {
        main.classList.toggle('ml-64');
    }
}

document.addEventListener("DOMContentLoaded", () => {
    const sidebar = document.getElementById('sidebar');
    if (window.innerWidth < 768) {
        sidebar.classList.add('collapsed');
    }
});
</script>

<style>
    #sidebar {
        position: fixed;
        inline-size: 250px;
        transition: all 0.3s;
    }

    #sidebar.active {
        inset-inline-start: 0;
    }

    #sidebar.collapsed {
        inline-size: 70px;
    }

    #sidebar.collapsed .text,

    #sidebar.collapsed .label {
        display: none;
    }
    #mainContent {
        margin-inline-start: 0 !important;
    }
</style>
</body>
