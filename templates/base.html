<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUM Room Locator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body class="bg-gray-100">

<div class="flex">

    {% if current_user.is_authenticated %}

    <!-- SIDEBAR -->
    <div id="sidebar"
         class="bg-green-700 text-white h-screen w-64 p-5 fixed transition-all duration-300">

        <button onclick="toggleSidebar()" class="mb-6">
            ☰
        </button>

        <div id="sidebarContent">
            <p class="font-semibold">{{ current_user.username }}</p>
            <p class="text-xs text-gray-200 mb-6">{{ current_user.email }}</p>

            <nav class="flex flex-col gap-3">
                <a href="/map">Map</a>
                <a href="/account">Account</a>

                {% if current_user.role == 'admin' %}
                    <a href="/admin">Admin</a>
                {% endif %}
            </nav>
        </div>

        <a href="/logout" class="absolute bottom-5">Logout</a>

    </div>

    {% endif %}

    <!-- MAIN -->
    <div id="mainContent" class="flex-1 ml-64 p-6 transition-all duration-300">
        {% block content %}{% endblock %}
    </div>

</div>

<script>
let collapsed = false;

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('mainContent');

    if (!collapsed) {
        sidebar.style.width = '70px';
        content.style.marginLeft = '70px';
    } else {
        sidebar.style.width = '256px';
        content.style.marginLeft = '256px';
    }

    collapsed = !collapsed;
}
</script>

</body>
