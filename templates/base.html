<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUM Room Locator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body class="bg-gray-100">

{% if 'user_id' in session %}
<button onclick="toggleSidebar()"
        class="fixed top-4 left-4 z-[3000] bg-green-700 text-white px-3 py-2 rounded-lg shadow md:hidden">
    ☰
</button>
{% endif %}

<div class="min-h-screen">

    {% if 'user_id' in session %}

    <!-- SIDEBAR -->
    <aside id="sidebar"
           class="fixed top-0 left-0 h-screen w-64 bg-green-700 text-white z-[2500]
                  transform -translate-x-full md:translate-x-0 transition-transform duration-300">

        <div class="p-5 pt-16 md:pt-5 flex flex-col h-full">

            <div class="mb-6">
                <h1 class="font-bold text-lg">TUM Locator</h1>
                <p class="text-sm mt-3">{{ current_user.username }}</p>
                <p class="text-xs text-green-100 break-all">{{ current_user.email }}</p>
            </div>

            <nav class="flex flex-col gap-2 text-sm">
                <a href="/map" class="px-3 py-2 rounded hover:bg-green-800">Map</a>
                <a href="/account" class="px-3 py-2 rounded hover:bg-green-800">Account</a>
                <a href="/recents" class="px-3 py-2 rounded hover:bg-green-800">Recents</a>

                {% if current_user.role == 'admin' %}
                    <a href="/admin" class="px-3 py-2 rounded hover:bg-green-800">Admin Dashboard</a>
                    <a href="/manage_users" class="px-3 py-2 rounded hover:bg-green-800">Manage Users</a>
                {% endif %}
            </nav>

            <div class="mt-auto">
                <a href="/logout" class="block px-3 py-2 rounded hover:bg-red-600">Logout</a>
            </div>

        </div>
    </aside>

    <!-- MOBILE OVERLAY -->
    <div id="sidebarOverlay"
         onclick="toggleSidebar()"
         class="hidden fixed inset-0 bg-black bg-opacity-40 z-[2400] md:hidden"></div>

    {% endif %}

    <!-- MAIN -->
    <main id="mainContent"
          class="{% if 'user_id' in session %}md:ml-64{% endif %} min-h-screen transition-all duration-300">
        {% block content %}{% endblock %}
    </main>

</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    if (!sidebar) return;

    sidebar.classList.toggle('-translate-x-full');

    if (overlay) {
        overlay.classList.toggle('hidden');
    }

    setTimeout(() => {
        if (window.map) {
            window.map.invalidateSize();
        }
    }, 350);
}
</script>

</body>
</html>
