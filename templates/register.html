{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded shadow">

    <h2 class="text-xl font-semibold mb-4 text-center">Create Account</h2>

    {% if error %}
    <div class="bg-red-100 text-red-700 p-2 mb-3 rounded">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-4">

        <input name="username" placeholder="Username"
            class="w-full p-2 border rounded" required>

        <input type="password" name="password" placeholder="Password"
            class="w-full p-2 border rounded" required>

        <input type="password" name="confirm_password" placeholder="Confirm Password"
            class="w-full p-2 border rounded" required>

        <button type="submit"
            class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
            Register
        </button>

    </form>

    <p class="mt-4 text-center text-sm">
        <a href="/login" class="text-blue-600 hover:underline">
            Already have an account? Login
        </a>
    </p>

</div>

{% endblock %}
