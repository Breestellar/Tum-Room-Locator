<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-xl font-semibold mb-4">Create Account</h2>

    <form method="POST">
        <input name="username" placeholder="Username"
            class="w-full mb-3 p-2 border rounded" required> <br><br>

        <input type="password" name="password" placeholder="Password"
            class="w-full mb-3 p-2 border rounded" required><br><br>

        <input type="password" name="password" placeholder="Repeat Password"
            class="w-full mb-3 p-2 border rounded" required><br><br>

        <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">
            Register
        </button>
        <p class="mt-4 text-center">
            <a href="/login">Have an account? Login instead</a>
        </p>
    </form>

</div>
