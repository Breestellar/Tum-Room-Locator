{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">

    <h2 class="text-2xl font-bold text-green-700 mb-2">Change Password</h2>
    <p class="text-sm text-gray-500 mb-6">
        Enter your current password before setting a new one.
    </p>

    <form method="POST" class="space-y-4">

        <input type="password" name="current_password" placeholder="Current Password"
               class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
               required>

        <input type="password" name="new_password" placeholder="New Password"
               class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
               required>

        <input type="password" name="confirm_password" placeholder="Confirm New Password"
               class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
               required>

        <button type="submit"
                class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
            Update Password
        </button>

    </form>

    <p class="mt-5 text-center text-sm">
        <a href="/account" class="text-blue-600 hover:underline">Back to Account</a>
    </p>

</div>

{% endblock %}
