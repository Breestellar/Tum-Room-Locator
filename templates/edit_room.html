{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">

    <h2 class="text-2xl font-bold text-green-700 mb-6">Edit Room</h2>

    <form method="POST" class="space-y-4">
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" id="name" name="name" value="{{ room.name }}"
               class="w-full border p-3 rounded-lg" required>

        <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
        <input type="text" id="description" name="description" value="{{ room.description }}"
               class="w-full border p-3 rounded-lg" placeholder="Enter room description">

        <label for="floor" class="block text-sm font-medium text-gray-700">Floor</label>
        <input type="text" id="floor" name="floor" value="{{ room.floor }}"
               class="w-full border p-3 rounded-lg" placeholder="Enter floor number">

        <label for="instructions" class="block text-sm font-medium text-gray-700">Instructions</label>
        <textarea id="instructions" name="instructions"
                  class="w-full border p-3 rounded-lg"
                  placeholder="Room directions / instructions">{{ room.instructions }}</textarea>

        <button type="submit"
                class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
            Save Changes
        </button>
    </form>

    <p class="mt-5 text-center text-sm">
        <a href="/admin" class="text-blue-600 hover:underline">Back to Admin</a>
    </p>

</div>

{% endblock %}
