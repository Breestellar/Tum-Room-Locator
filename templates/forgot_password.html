{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl shadow">
    <h2 class="text-2xl font-bold text-green-700 text-center mb-2">Forgot Password</h2>

    <p class="text-sm text-gray-500 text-center mb-6">
        Enter your email address and we’ll send you a 6-digit OTP.
    </p>

    <form method="POST" class="space-y-4">
        <input type="email" name="email" placeholder="Enter your email"
               class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
               required>

        <button type="submit"
                class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
            Send OTP
        </button>
    </form>

    <p class="mt-5 text-center text-sm">
        <a href="/login" class="text-blue-600 hover:underline">Back to Login</a>
    </p>
</div>

{% endblock %}
